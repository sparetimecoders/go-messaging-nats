name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats@sha256:c9abdce88a85ed5fcc8e9fc6b284d2601f5d1c1d0d58ddd67cfdc411768bfd7f # latest
        ports:
          - "4222:4222"
    steps:
      - name: Wait for NATS
        run: timeout 30 bash -c 'until nc -z localhost 4222; do sleep 0.5; done'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - name: Tests
        run: |
          go test -count=1 -race -coverprofile=coverage.txt -covermode=atomic -coverpkg="$(go list ./... | grep -v /cmd/ | tr '\n' , | sed 's/,$//')" ./...
          go tool cover -func=coverage.txt
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: go vet ./...
      - name: Build TCK adapter
        run: go build ./cmd/tck-adapter/
